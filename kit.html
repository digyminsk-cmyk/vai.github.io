<html>
<head>
<meta charset="UTF-8">
<title>Комплект</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>Открываем корзину...</h2>

<script>
function getHash() {
    const params = new URLSearchParams(window.location.search);
    return params.get("hash");
}

const hash = getHash();

if (hash) {
    window.location.href = "https://www.vseinstrumenti.ru/cart/?sharingHash=" + hash;
} else {
    document.body.innerHTML = "Hash корзины не найден";
}
</script>

</body>
</html>
