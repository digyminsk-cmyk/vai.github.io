<html>
<head>
<meta charset="UTF-8">
<title>Комплект</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>Открываем корзину...</h2>

<script>
function getCartLink() {
    const params = new URLSearchParams(window.location.search);
    return params.get("cart");
}

const link = getCartLink();

if (link) {
    window.location.href = link;
} else {
    document.body.innerHTML = "Ссылка на корзину не найдена";
}
</script>

</body>
</html>
